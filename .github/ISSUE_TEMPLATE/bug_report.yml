name: Bug Report
description: Report a bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Thanks for reporting a bug!"
  - type: input
    id: summary
    attributes:
      label: Summary
      description: Brief summary of the bug
      placeholder: "EventBus.publish() raises KeyError when handler throws"
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce
      placeholder: |
        1. Create EventBus
        2. Subscribe handler that raises
        3. Publish event
        4. Observe KeyError
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happens
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Python version, package version
      placeholder: "Python 3.11, eda-starter 0.1.0"
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Logs, screenshots, etc.